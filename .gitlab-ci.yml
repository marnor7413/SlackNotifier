stages:
  - build
  - test
  - docker

variables:
  HARBOR_REGISTRY: "192.168.50.6"
  HARBOR_PROJECT: "homelab"
  IMAGE_NAME: "slacknotifier"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore SlackNotifier.slnx
    - dotnet build SlackNotifier.slnx --configuration Release --no-restore
  artifacts:
    paths:
      - "**/bin/Release/"
    expire_in: 1 hour

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet test SlackNotifier.slnx --configuration Release --no-build
  dependencies:
    - build

docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login $HARBOR_REGISTRY --username "$HARBOR_USER" --password-stdin
  script:
    - docker build -t $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$IMAGE_TAG .
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$IMAGE_TAG
  dependencies:
    - build