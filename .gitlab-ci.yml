stages:
  - build
  - test
  - docker

variables:
  HARBOR_REGISTRY: "192.168.50.6"
  HARBOR_PROJECT: "homelab"
  IMAGE_NAME: "slacknotifier"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore SlackNotifier.slnx
    - dotnet build SlackNotifier.slnx --configuration Release --no-restore
  artifacts:
    paths:
      - "**/bin/Release/"
    expire_in: 1 hour

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet test SlackNotifier.slnx --configuration Release --no-build
  dependencies:
    - build

docker:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"192.168.50.6\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - cp /etc/ssl/certs/harbor/harbor.crt /kaniko/ssl/certs/harbor.crt
  script:
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --destination $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$IMAGE_TAG
      --registry-certificate 192.168.50.6=/kaniko/ssl/certs/harbor.crt
  dependencies:
    - build