stages:
  - build
  - test
  - docker
  - deploy

variables:
  HARBOR_REGISTRY: "192.168.50.6"
  HARBOR_PROJECT: "homelab"
  IMAGE_NAME: "slacknotifier"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore SlackNotifier.slnx
    - dotnet build SlackNotifier.slnx --configuration Release --no-restore
  artifacts:
    paths:
      - "**/bin/Release/"
    expire_in: 1 hour

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet test SlackNotifier.slnx --configuration Release --no-build
  dependencies:
    - build

docker:
  stage: docker
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    - export SSL_CERT_FILE="$HOME/ca_chain.pem"
    - cat /etc/ssl/certs/ca-certificates.crt > "$SSL_CERT_FILE"
    - cat /etc/ssl/certs/harbor/harbor.crt >> "$SSL_CERT_FILE"
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"192.168.50.6\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=$CI_PROJECT_DIR \
        --local dockerfile=$CI_PROJECT_DIR \
        --output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$IMAGE_TAG,push=true
  dependencies:
    - build

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git clone https://oauth2:$GITLAB_TOKEN@gitlab.com/homelab3373419/k8s-gitops.git
    - cd k8s-gitops
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    - sed -i "s|image:.*slacknotifier.*|image: 192.168.50.6/homelab/slacknotifier:$CI_COMMIT_SHORT_SHA|" slacknotifier/deployment.yaml
    - git add slacknotifier/deployment.yaml
    - git commit -m "ci: update image tag to $CI_COMMIT_SHORT_SHA"
    - git push
  dependencies: []
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /^ci: update image tag/'
      when: never
    - when: on_success